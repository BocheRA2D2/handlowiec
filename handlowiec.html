<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Handlowiec Mobile ERP</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        /* --- GLOBALNE STYLE MOBILE-FIRST --- */
        :root {
            --sat: env(safe-area-inset-top);
            --sab: env(safe-area-inset-bottom);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            /* Slate-50 */
            overscroll-behavior-y: none;
            /* Blokada pull-to-refresh */
            -webkit-tap-highlight-color: transparent;
        }

        /* Ukrywanie scrollbara */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Obsługa Safe Area (iPhone Notch/Home Bar) */
        .pt-safe {
            padding-top: max(12px, var(--sat));
        }

        .pb-safe {
            padding-bottom: max(12px, var(--sab));
        }

        /* Inputy nie zoomują na iOS */
        input,
        select,
        textarea {
            font-size: 16px !important;
        }

        /* Animacje */
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 h-[100dvh] w-full overflow-hidden select-none">

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-type="module" data-presets="react">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, deleteDoc, doc, updateDoc, setDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- KONFIGURACJA FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBVaJTldlll3WR4JOoyGK8TeXPnId0hfGc",
            authDomain: "erpsystem-502b4.firebaseapp.com",
            projectId: "erpsystem-502b4",
            storageBucket: "erpsystem-502b4.firebasestorage.app",
            messagingSenderId: "561812967162",
            appId: "1:561812967162:web:25b02e89e104ed10228343"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "default_erp_v1";

        // --- IKONY ---
        const Icon = ({ path, size = 24, className = "", strokeWidth = 2 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );

        const icons = {
            plus: '<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>',
            userTie: '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline>',
            fire: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.1.2-2.2.6-3.3a1 1 0 0 1 .9.8z"></path>',
            lock: '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>',
            pause: '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>',
            checkCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
            x: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
            shoppingCart: '<circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>',
            externalLink: '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>',
            paperclip: '<path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>',
            edit3: '<path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>',
            trash2: '<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>',
            fileText: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline>',
            logOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line>',
            calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>',
            truck: '<rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>',
            package: '<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>',
            search: '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
            map: '<polygon points="1 6 1 22 8 18 16 22 21 18 21 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line>',
            chevronDown: '<polyline points="6 9 12 15 18 9"></polyline>',
            chevronRight: '<polyline points="9 18 15 12 9 6"></polyline>',
            phone: '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>',
            list: '<line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>',
            save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline>',
            clipboard: '<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>'
        };

        const PHONE_COURIERS = ["DHL", "DPD", "INPOST", "GLS", "UPS", "FEDEX", "SCHENKER", "ALLEGRO", "PALETY", "TNT"];
        const BUYERS = [
            "Bolingier Krzysztof", "Durek Bartek", "Filipczyk Tomasz", "Holik Dariusz", "Kulej Marcin",
            "Nartowski Konrad", "Nieszporek Ksenia", "Nosalik Jakub", "Pach Iza", "Pach Krzysztof",
            "Tokarz Paweł", "Wilk Przemysław", "Wojniak Marcin", "Biuro", "EuroSlet", "Koszty ogólne",
            "Księgowość", "Magazyn", "Magda Suska", "MD Partner", "Na Stan", "Patryk Bochra", "Produkcja", "Inny"
        ];
        const BASE_DAYS = [
            { key: 'mon', label: 'Pon', index: 1 }, { key: 'tue', label: 'Wt', index: 2 },
            { key: 'wed', label: 'Śr', index: 3 }, { key: 'thu', label: 'Czw', index: 4 }, { key: 'fri', label: 'Pt', index: 5 }
        ];

        // --- POMOCNICZE ---
        const getTodayKey = () => {
            const d = new Date().getDay();
            return (d >= 1 && d <= 5) ? BASE_DAYS[d - 1].key : 'mon';
        };

        const checkIsOverdue = (p) => {
            if (p.isDone || !p.date) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const taskDate = new Date(p.date + 'T00:00:00');
            return taskDate < today;
        };

        // --- GŁÓWNY KOMPONENT ---
        function MobileHandlowiec() {
            // Sprawdzamy, czy użytkownik zalogował się prawidłowo (z hasłem)
            const hasValidLogin = localStorage.getItem('erp_logged_with_password') === 'true';

            // Jeśli nie ma flagi prawidłowego logowania, czyścimy stare dane
            if (!hasValidLogin) {
                localStorage.removeItem('erp_sales_name');
            }

            const [user, setUser] = useState(null);
            const [isDemoMode, setIsDemoMode] = useState(false);
            const [salesName, setSalesName] = useState(hasValidLogin ? (localStorage.getItem('erp_sales_name') || '') : '');
            const [activeTab, setActiveTab] = useState('sales'); // sales | warehouse | phones
            const [toast, setToast] = useState(null);

            // --- STANY ---
            const [points, setPoints] = useState([]);
            const [activeDay, setActiveDay] = useState(getTodayKey());
            const [todayIndex, setTodayIndex] = useState(new Date().getDay());

            const [deliveries, setDeliveries] = useState([]);
            const [whDate, setWhDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedCourier, setSelectedCourier] = useState('');

            const [phones, setPhones] = useState([]);
            const [phoneSearch, setPhoneSearch] = useState('');
            const [purchases, setPurchases] = useState([]);
            const [buyerFilter, setBuyerFilter] = useState('');
            const [purchaseSearch, setPurchaseSearch] = useState('');
            const [expandedPurchaseId, setExpandedPurchaseId] = useState(null);

            // --- MODALE ---
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [isPhoneModalOpen, setIsPhoneModalOpen] = useState(false);

            // --- FORMULARZE ---
            const [newData, setNewData] = useState({ client: '', note: '', driver: 'Dawid', isUrgent: false, isAnyDriver: false });
            const [editData, setEditData] = useState({ id: null, client: '', note: '', assignedDriver: '', isUrgent: false, isPaused: false, dayOfWeek: '' });
            const [phoneData, setPhoneData] = useState({ id: null, carrier: '', name: '', number: '', notes: '' });

            // --- RABATY STANY ---
            const [discounts, setDiscounts] = useState([]);
            const [discountSearch, setDiscountSearch] = useState('');
            const [expandedDiscountId, setExpandedDiscountId] = useState(null);
            const [isDiscountModalOpen, setIsDiscountModalOpen] = useState(false);
            const [discountForm, setDiscountForm] = useState({ id: null, supplier: '', discount: '', details: '', notes: '', login: '', password: '', www: '' });

            // --- AUTH ---
            useEffect(() => {
                signInAnonymously(auth).catch(() => setIsDemoMode(true));
                return onAuthStateChanged(auth, setUser);
            }, []);

            // --- DATA LOADING ---
            useEffect(() => {
                // TRASA
                const qPoints = query(collection(db, 'artifacts', appId, 'public', 'data', 'route_points'));
                const unsubPoints = onSnapshot(qPoints, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setPoints(data);
                }, () => setIsDemoMode(true));

                // MAGAZYN
                const qDeliv = query(collection(db, 'artifacts', appId, 'public', 'data', 'warehouse_deliveries'));
                const unsubDeliv = onSnapshot(qDeliv, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => b.date.localeCompare(a.date));
                    setDeliveries(data);
                });
                // ZAKUPY ALLEGRO
                const qPurchases = query(
                    collection(db, 'artifacts', appId, 'public', 'data', 'allegro_purchases'),
                    orderBy('date', 'desc'),
                    limit(500)
                );
                const unsubPurchases = onSnapshot(qPurchases, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => new Date(b.date) - new Date(a.date));
                    setPurchases(data.filter(d => d.type !== 'group'));
                });

                // TELEFONY
                const qPhones = query(collection(db, 'artifacts', appId, 'public', 'data', 'warehouse_phones'));
                const unsubPhones = onSnapshot(qPhones, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => a.carrier.localeCompare(b.carrier) || a.name.localeCompare(b.name));
                    setPhones(data);
                });

                // RABATY
                const qDiscounts = query(collection(db, 'artifacts', appId, 'public', 'data', 'discounts'));
                const unsubDiscounts = onSnapshot(qDiscounts, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => (a.supplier || '').localeCompare(b.supplier || ''));
                    setDiscounts(data);
                });

                return () => { unsubPoints(); unsubDeliv(); unsubPhones(); unsubPurchases(); unsubDiscounts(); };
            }, []);

            // --- COMPUTED: DNI TYGODNIA (RESPONSYWNE) ---
            const sortedTabs = useMemo(() => {
                const formatDateISO = (d) => {
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                };

                const ordered = [];
                let d = new Date();

                // Ustalanie poniedziałku bieżącego tygodnia (lub następnego jeśli weekend)
                const currentDay = d.getDay(); // 0-Sun, 1-Mon...
                // Jeśli niedziela (0), cofnij o 6 dni do poniedziałku? Albo traktuj jako przyszły tydzień.
                // W wersji mobile: po prostu generujemy 5 kolejnych dni roboczych zaczynając od dziś lub poniedziałku.
                // Zachowajmy logikę, która była, ale dodajmy `fullDate` w ISO.

                if (d.getDay() === 6) d.setDate(d.getDate() + 2); // Sobota -> Poniedziałek
                if (d.getDay() === 0) d.setDate(d.getDate() + 1); // Niedziela -> Poniedziałek

                let count = 0;
                while (count < 5) {
                    const dayIndex = d.getDay();
                    if (dayIndex >= 1 && dayIndex <= 5) {
                        const fullDate = formatDateISO(d); // Używamy naszej funkcji
                        const display = d.toLocaleDateString('pl-PL', { day: 'numeric', month: 'short' });
                        const base = BASE_DAYS.find(b => b.index === dayIndex);
                        ordered.push({ ...base, fullDate: fullDate, displayDate: display });
                        count++;
                    }
                    d.setDate(d.getDate() + 1);
                }
                return ordered;
            }, [todayIndex]);

            // --- COMPUTED LISTS ---
            const visiblePoints = points.filter(p => {
                const activeTabObj = sortedTabs.find(t => t.key === activeDay);
                if (!activeTabObj) return false;

                const targetDate = activeTabObj.fullDate;
                const todayStr = new Date().toISOString().split('T')[0];

                // 1. Nowa logika dat (priorytet)
                if (p.date) {
                    if (p.date === targetDate) return true;
                    // Pokaż zaległe tylko w zakładce, która reprezentuje "Dziś"
                    if (targetDate === todayStr && checkIsOverdue(p)) return true;
                    return false;
                }

                // 2. Stara logika (kompatybilność)
                if (p.dayOfWeek === activeDay) return !p.isDone;

                // 3. Zaległe dla starych
                if (targetDate === todayStr && checkIsOverdue(p)) return true;

                return false;
            }).sort((a, b) => {
                // 1. NAJPIERW: Wykonane na sam dół (niezależnie czy były pilne/zaległe)
                if (a.isDone !== b.isDone) return a.isDone ? 1 : -1;

                // 2. Dopiero potem ZALEGŁE (z wczoraj i starsze)
                const aOver = checkIsOverdue(a);
                const bOver = checkIsOverdue(b);
                if (aOver !== bOver) return aOver ? -1 : 1;

                // 3. Następnie PILNE (nad zwykłymi z tego samego dnia)
                const aUrgent = a.isUrgent || false;
                const bUrgent = b.isUrgent || false;
                if (aUrgent !== bUrgent) return aUrgent ? -1 : 1;

                // 4. Sortowanie po konkretnej dacie (dla widoku Odległe)
                if (a.date && b.date && a.date !== b.date) {
                    return a.date.localeCompare(b.date);
                }

                // 5. Na końcu data dodania (od najstarszych do najnowszych)
                const dateA = a.createdAt || 0;
                const dateB = b.createdAt || 0;
                return dateA - dateB;
            });

            const visibleDeliveries = deliveries.filter(d => {
                if (d.date !== whDate) return false;
                if (selectedCourier) return d.courier === selectedCourier;
                return true;
            });

            const visiblePhones = phones.filter(p => {
                const term = phoneSearch.toLowerCase();
                return p.carrier.toLowerCase().includes(term) ||
                    p.name.toLowerCase().includes(term) ||
                    p.number.includes(term);
            });

            const couriersWithCounts = useMemo(() => {
                const counts = {};
                deliveries.filter(d => d.date === whDate).forEach(d => {
                    const c = d.courier || 'Inny';
                    counts[c] = (counts[c] || 0) + 1;
                });
                return Object.keys(counts).sort().map(name => ({ name, count: counts[name] }));
            }, [deliveries, whDate]);

            // --- ACTIONS ---
            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

            const handleAdd = async () => {
                if (!newData.client) return;
                const currentTab = sortedTabs.find(t => t.key === activeDay);
                const item = {
                    client: newData.client,
                    note: newData.note,
                    isUrgent: newData.isUrgent,
                    dayOfWeek: activeDay,
                    date: currentTab ? currentTab.fullDate : new Date().toISOString().split('T')[0],
                    assignedDriver: "",
                    addedBy: salesName,
                    createdAt: Date.now(),
                    isDone: false
                };
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'route_points'), item);
                setNewData({ client: '', note: '', driver: 'Dawid', isUrgent: false, isAnyDriver: false });
                setIsAddModalOpen(false);
                showToast("Dodano zlecenie!");
            };

            const handleSaveEdit = async () => {
                if (!editData.id) return;
                const selectedTab = sortedTabs.find(t => t.key === editData.dayOfWeek);
                const newDate = selectedTab ? selectedTab.fullDate : undefined;

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'route_points', editData.id), {
                    client: editData.client,
                    note: editData.note,
                    assignedDriver: editData.assignedDriver === 'WOLNE' ? '' : editData.assignedDriver,
                    isUrgent: editData.isUrgent,
                    isPaused: editData.isPaused,
                    dayOfWeek: editData.dayOfWeek,
                    date: newDate
                });
                setIsEditModalOpen(false);
                showToast("Zapisano!");
            };

            const togglePause = async (p, e) => {
                e.stopPropagation();
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'route_points', p.id), { isPaused: !p.isPaused });
            };

            const handleDelete = async () => {
                if (confirm("Usunąć?")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'route_points', editData.id));
                    setIsEditModalOpen(false);
                    showToast("Usunięto.");
                }
            };

            const handleSavePhone = async () => {
                if (!phoneData.carrier || !phoneData.number) return alert("Podaj firmę i numer!");
                const payload = { carrier: phoneData.carrier, name: phoneData.name, number: phoneData.number, notes: phoneData.notes, updatedAt: new Date().toISOString() };

                if (phoneData.id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'warehouse_phones', phoneData.id), payload);
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'warehouse_phones'), { ...payload, createdAt: new Date().toISOString() });

                setIsPhoneModalOpen(false);
                setPhoneData({ id: null, carrier: '', name: '', number: '', notes: '' });
                showToast("Zapisano kontakt!");
            };

            const handleDeletePhone = async (id) => {

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Uwagi</label>
                                        <textarea rows="2" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-base outline-none focus:border-green-500 transition" value={phoneData.notes} onChange={e => setPhoneData({ ...phoneData, notes: e.target.value })}></textarea>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        {phoneData.id && <button onClick={() => handleDeletePhone(phoneData.id)} className="w-14 bg-white border border-red-200 text-red-500 rounded-2xl flex items-center justify-center hover:bg-red-50 transition"><Icon path={icons.trash2} /></button>}
                                        <button onClick={handleSavePhone} className="flex-1 bg-green-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-200 active:scale-95 transition-transform">ZAPISZ</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MobileHandlowiec />);
    </script>
</body>

</html>
